<!DOCTYPE html>
<html lang="ko" class="light">
<head>
  <meta http-equiv="refresh" content="0; url=index.html">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 탑그래머잉글리쉬</title>
  <meta name="description" content="탑그래머잉글리쉬 회원 로그인.">
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="css/core.css?v=8">
  <link rel="stylesheet" href="css/components.css?v=9">
  <link rel="stylesheet" href="css/premium.css?v=1">
  <link rel="icon" type="image/svg+xml" href="images/logo-icon.svg">
  <link rel="canonical" href="https://topgrammar.co.kr/login.html">
  <meta name="theme-color" content="#1B3A5C">
  <style>
    body{opacity:1!important;margin:0;background:#f6f8fc}
    .auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.2rem;font-family:'Pretendard',sans-serif}
    .auth-card{width:100%;max-width:400px;background:#fff;border:1px solid #e5e9f2;border-radius:16px;padding:2rem 1.8rem;box-shadow:0 8px 30px rgba(26,61,143,.08)}
    .auth-logo{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-bottom:1.4rem}
    .auth-logo img{width:38px;height:38px}
    .auth-logo b{font-size:1.15rem;color:#1a3d8f}
    .auth-card h1{font-size:1.4rem;font-weight:800;text-align:center;margin:0 0 1.4rem;color:#16233a}
    .auth-card label{display:block;font-size:.88rem;color:#374151;font-weight:600;margin:.9rem 0 .3rem}
    .auth-card input{width:100%;box-sizing:border-box;padding:.78rem .85rem;border:1px solid #d6dbe7;border-radius:9px;font-size:1rem;font-family:inherit}
    .auth-card input:focus{outline:none;border-color:#1a3d8f;box-shadow:0 0 0 3px rgba(26,61,143,.12)}
    .auth-btn{width:100%;margin-top:1.3rem;padding:.85rem 0;background:#1a3d8f;color:#fff;border:none;border-radius:10px;font-size:1.05rem;font-weight:700;cursor:pointer}
    .auth-btn:disabled{background:#9aa6c4;cursor:not-allowed}
    .auth-links{display:flex;justify-content:space-between;margin-top:1.1rem;font-size:.88rem}
    .auth-links a{color:#1a3d8f;text-decoration:none}
    .auth-msg{margin-top:1rem;font-size:.88rem;text-align:center;min-height:1.2em}
    .auth-msg.err{color:#dc2626}.auth-msg.ok{color:#059669}
    .auth-notice{margin-top:1rem;font-size:.82rem;color:#92600a;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:.7rem .85rem;line-height:1.5;text-align:center}
    .auth-home{margin-top:1.5rem;font-size:.85rem}.auth-home a{color:#667085;text-decoration:none}
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <a class="auth-logo" href="index.html"><img src="images/logo-icon.svg" alt="로고"><b>탑그래머잉글리쉬</b></a>
      <h1>로그인</h1>
      <form id="loginForm" autocomplete="on">
        <label for="email">이메일</label>
        <input id="email" type="email" required autocomplete="email" placeholder="example@email.com">
        <label for="pw">비밀번호</label>
        <input id="pw" type="password" required autocomplete="current-password" placeholder="비밀번호">
        <button id="loginBtn" class="auth-btn" type="submit">로그인</button>
      </form>
      <div id="msg" class="auth-msg" role="alert"></div>
      <div class="auth-links">
        <a href="signup.html">회원가입</a>
        <a href="reset-password.html">아이디·비밀번호 찾기</a>
      </div>
      <div id="setupNotice" class="auth-notice" style="display:none">회원 시스템 연결 준비 중입니다. 가입·상담은 <a href="register.html" style="color:#1a3d8f">수강 등록 신청</a> 또는 전화(031-938-8889)로 가능합니다.</div>
      <div class="auth-home"><a href="index.html">← 홈으로</a></div>
    </div>
  </div>

</body>
</html>
