<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1B3A5C"/>
      <stop offset="100%" stop-color="#142E4A"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>
  <!-- Subtle inner shadow ring -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <!-- TG letters -->
  <text x="256" y="310" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="220" fill="#FFFFFF" letter-spacing="-8">TG</text>
  <!-- Orange accent bar -->
  <rect x="120" y="370" width="272" height="24" rx="12" fill="#E87A3A"/>
</svg>
