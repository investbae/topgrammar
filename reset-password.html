<!DOCTYPE html>
<html lang="ko" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아이디·비밀번호 찾기 - 탑그래머잉글리쉬</title>
  <meta name="description" content="탑그래머잉글리쉬 비밀번호 재설정.">
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="css/core.css?v=6">
  <link rel="stylesheet" href="css/components.css?v=8">
  <link rel="stylesheet" href="css/premium.css?v=1">
  <link rel="icon" type="image/svg+xml" href="images/logo-icon.svg">
  <link rel="canonical" href="https://topgrammar.co.kr/reset-password.html">
  <meta name="theme-color" content="#1B3A5C">
  <style>
    body{opacity:1!important;margin:0;background:#f6f8fc}
    .auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.2rem;font-family:'Pretendard',sans-serif}
    .auth-card{width:100%;max-width:400px;background:#fff;border:1px solid #e5e9f2;border-radius:16px;padding:2rem 1.8rem;box-shadow:0 8px 30px rgba(26,61,143,.08)}
    .auth-logo{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-bottom:1.3rem}
    .auth-logo img{width:38px;height:38px}.auth-logo b{font-size:1.15rem;color:#1a3d8f}
    .auth-card h1{font-size:1.35rem;font-weight:800;text-align:center;margin:0 0 .5rem;color:#16233a}
    .auth-card .desc{font-size:.88rem;color:#667085;text-align:center;line-height:1.6;margin:0 0 1.2rem}
    .auth-card label{display:block;font-size:.88rem;color:#374151;font-weight:600;margin:.9rem 0 .3rem}
    .auth-card input{width:100%;box-sizing:border-box;padding:.78rem .85rem;border:1px solid #d6dbe7;border-radius:9px;font-size:1rem;font-family:inherit}
    .auth-card input:focus{outline:none;border-color:#1a3d8f;box-shadow:0 0 0 3px rgba(26,61,143,.12)}
    .auth-btn{width:100%;margin-top:1.2rem;padding:.85rem 0;background:#1a3d8f;color:#fff;border:none;border-radius:10px;font-size:1.05rem;font-weight:700;cursor:pointer}
    .auth-btn:disabled{background:#9aa6c4;cursor:not-allowed}
    .auth-links{text-align:center;margin-top:1.1rem;font-size:.88rem}.auth-links a{color:#1a3d8f;text-decoration:none}
    .auth-msg{margin-top:1rem;font-size:.88rem;text-align:center;min-height:1.2em}
    .auth-msg.err{color:#dc2626}.auth-msg.ok{color:#059669}
    .idinfo{margin-top:1rem;font-size:.82rem;color:#475569;background:#eef2fb;border:1px solid #dbe3f5;border-radius:8px;padding:.7rem .85rem;line-height:1.55}
    .auth-notice{margin-top:1rem;font-size:.82rem;color:#92600a;background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:.7rem .85rem;line-height:1.5;text-align:center}
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <a class="auth-logo" href="index.html"><img src="images/logo-icon.svg" alt="로고"><b>탑그래머잉글리쉬</b></a>
      <h1>아이디·비밀번호 찾기</h1>
      <p class="desc">가입하신 이메일을 입력하시면 비밀번호 재설정 링크를 보내드립니다.</p>
      <form id="resetForm">
        <label for="email">가입 이메일</label>
        <input id="email" type="email" required placeholder="example@email.com">
        <button id="resetBtn" class="auth-btn" type="submit">재설정 메일 보내기</button>
      </form>
      <div id="msg" class="auth-msg" role="alert"></div>
      <div class="idinfo">💡 <strong>아이디 안내</strong>: 본 사이트는 <strong>이메일이 곧 로그인 아이디</strong>입니다. 가입에 사용하신 이메일로 로그인·재설정하세요. 이메일이 기억나지 않으면 전화(031-938-8889)로 문의해 주세요.</div>
      <div class="auth-links"><a href="login.html">로그인</a> · <a href="signup.html">회원가입</a> · <a href="index.html">홈</a></div>
      <div id="setupNotice" class="auth-notice" style="display:none">회원 시스템 연결 준비 중입니다. 문의는 전화(031-938-8889)로 가능합니다.</div>
    </div>
  </div>

  <script type="module">
    const firebaseConfig = {
      apiKey: "__FIREBASE_API_KEY__",
      authDomain: "__FIREBASE_AUTH_DOMAIN__",
      projectId: "__FIREBASE_PROJECT_ID__",
      appId: "__FIREBASE_APP_ID__"
    };
    const READY = !firebaseConfig.apiKey.startsWith("__");
    const msg = document.getElementById('msg'), form = document.getElementById('resetForm'), btn = document.getElementById('resetBtn');
    if (!READY) {
      document.getElementById('setupNotice').style.display='block'; btn.disabled=true;
      form.querySelectorAll('input').forEach(i=>i.disabled=true);
    } else {
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
      const { getAuth, sendPasswordResetEmail } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js");
      const auth = getAuth(initializeApp(firebaseConfig));
      form.addEventListener('submit', async (e)=>{
        e.preventDefault(); msg.className='auth-msg'; msg.textContent='메일 발송 중...'; btn.disabled=true;
        try {
          await sendPasswordResetEmail(auth, document.getElementById('email').value);
          msg.className='auth-msg ok'; msg.textContent='재설정 메일을 보냈습니다. 메일함을 확인해 주세요.';
        } catch(err){
          msg.className='auth-msg err';
          msg.textContent = (err.code||'').includes('user-not-found') ? '가입되지 않은 이메일입니다.' : '발송 실패: '+(err.message||err.code);
          btn.disabled=false;
        }
      });
    }
  </script>
</body>
</html>
